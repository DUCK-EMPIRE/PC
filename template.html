<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">DUCK EMPIRE - LOADING...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0D0D0D;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1600px;
            display: flex;
            gap: 5vw;
            align-items: start;
            padding: 40px 20px;
            flex-wrap: wrap;
        }

        .left-side {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: clamp(40px, 6vw, 80px); 
            margin: 0 0 30px 0;
            line-height: 1;
            text-transform: uppercase;
            background: #FFFFFF;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(200, 160, 80, 0.4));
        }

        .download-header {
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 800;
            color: #FFFF00;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .download-header::after {
            content: "";
            height: 2px;
            background: #333;
            flex-grow: 1;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-btn {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: clamp(15px, 2vh, 25px);
            text-decoration: none;
            font-size: clamp(16px, 1.5vw, 20px);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .link-btn:hover {
            background-color: #00e5ff;
            color: black;
            transform: translateX(10px);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            border-color: #00e5ff;
        }

        .instructions-box {
            margin-top: 30px;
            background-color: #151515;
            border: 1px dashed #444;
            padding: 20px;
            border-radius: 8px;
            color: #aaa;
            font-size: clamp(12px, 1vw, 14px);
            line-height: 1.6;
        }

        .instructions-box strong {
            color: #ffcc00;
        }

        .right-side {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .image-box {
            width: 100%;
            height: auto;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .image-box img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .req-box {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            border-left: 5px solid #ffcc00;
        }

        .req-box h3 {
            margin: 10px 0 10px 0;
            color: #ffcc00;
            text-transform: uppercase;
            font-size: clamp(14px, 1.2vw, 16px);
            letter-spacing: 1px;
        }

        .req-list {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            display: grid;
            gap: 5px;
            color: #ccc;
            font-size: clamp(13px, 1.1vw, 15px);
            text-transform: uppercase;
        }

        .req-list li strong {
            color: white;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 95%;
            }
            .left-side, .right-side {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source id="music-src" src="">
</audio>

<div class="container">
    <div class="left-side">
        <h1 id="game-title">LOADING...</h1>
        <div class="download-header">DOWNLOAD</div>
        <div class="links-container" id="links-container">
        </div>

        <div class="instructions-box" id="instructions-container">
        </div>
    </div>

    <div class="right-side">
        <div class="image-box">
            <img id="game-image" src="" alt="Game Picture">
        </div>

        <div class="req-box">
            <h3>System Requirements (RECOMMENDED)</h3>
            <ul class="req-list">
                <li><strong>OS:</strong> <span id="req-os">...</span></li>
                <li><strong>CPU:</strong> <span id="req-cpu">...</span></li>
                <li><strong>GPU:</strong> <span id="req-gpu">...</span></li>
                <li><strong>RAM:</strong> <span id="req-ram">...</span></li>
                <li><strong>STORAGE:</strong> <span id="req-storage">...</span></li>
                <li><strong>DIRECTX:</strong> <span id="req-dx">...</span></li>
            </ul>
        </div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSO2NCnGKW2SSHt5RkyY-_p3LTgaN1v8mSvtjXTAzI-QDWST4OBziHMNA3IEo2bEw/pub?output=csv';

    const urlParams = new URLSearchParams(window.location.search);
    const gameQuery = urlParams.get('game');

    async function loadGameDetails() {
        if (!gameQuery) {
            document.getElementById('game-title').innerText = "GAME NOT FOUND";
            return;
        }

        try {
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.text();
            
            const rows = data.split(/\r?\n/).slice(1); 
            
            const gameRow = rows.find(row => {
                const cols = row.split(',');
                return cols[0] && cols[0].trim().toLowerCase() === gameQuery.trim().toLowerCase();
            });

            if (gameRow) {
                const cols = gameRow.split(',');

                document.getElementById('page-title').innerText = cols[0].trim() + " - DUCK EMPIRE";
                document.getElementById('game-title').innerText = cols[0].trim();
                
                if (cols[12] && cols[12].trim() !== '') {
                    document.getElementById('game-image').src = cols[12].trim();
                } else {
                    document.getElementById('game-image').src = 'https://via.placeholder.com/1920x1080?text=No+Image+Available';
                }
                
                document.getElementById('game-image').onerror = function() { 
                    this.src = 'https://via.placeholder.com/1920x1080?text=No+Image+Available'; 
                };
                
                if(cols[3] && cols[3].trim() !== '') {
                    document.getElementById('music-src').src = cols[3].trim();
                    const audio = document.getElementById('bg-music');
                    audio.volume = 0.05;
                    audio.load();
                    document.addEventListener('click', function() { audio.play(); }, { once: true });
                }

                const linksContainer = document.getElementById('links-container');
                linksContainer.innerHTML = ''; 
                
                if (cols[4] && cols[4].trim() !== '') {
                    const allLinks = cols[4].split('|'); 
                    allLinks.forEach((link, index) => {
                        if (link.trim() !== '') { 
                            const linkElement = document.createElement('a');
                            linkElement.href = link.trim();
                            linkElement.target = "_blank";
                            linkElement.className = "link-btn";
                            
                            if (allLinks.length === 1) {
                                linkElement.innerText = "DOWNLOAD GAME";
                            } else {
                                linkElement.innerText = `PART ${index + 1}`;
                            }
                            linksContainer.appendChild(linkElement);
                        }
                    });
                } else {
                    linksContainer.innerHTML = '<div style="color:red; font-weight:bold;">NO LINKS AVAILABLE</div>';
                }

                document.getElementById('req-os').innerText = cols[5] ? cols[5].trim() : "N/A";
                document.getElementById('req-cpu').innerText = cols[6] ? cols[6].trim() : "N/A";
                document.getElementById('req-gpu').innerText = cols[7] ? cols[7].trim() : "N/A";
                document.getElementById('req-ram').innerText = cols[8] ? cols[8].trim() : "N/A";
                document.getElementById('req-storage').innerText = cols[9] ? cols[9].trim() : "N/A";
                document.getElementById('req-dx').innerText = cols[10] ? cols[10].trim() : "N/A";

                const instructionsContainer = document.getElementById('instructions-container');
                if (cols[11] && cols[11].trim() !== '') {
                    const instructionsList = cols[11].split('|');
                    let instructionsHTML = '<strong>INSTRUCTIONS:</strong><br>';
                    
                    instructionsList.forEach(line => {
                        if(line.trim() !== '') {
                            instructionsHTML += line.trim() + '<br>';
                        }
                    });
                    instructionsContainer.innerHTML = instructionsHTML;
                } else {
                    instructionsContainer.innerHTML = `
                        <strong>INSTRUCTIONS:</strong><br>
                        1. Extract the file using WinRAR.<br>
                        2. Run the setup file.<br>
                        PASSWORD: <strong>DUCKEMPIRE</strong><br>
                    `;
                }

            } else {
                document.getElementById('game-title').innerText = "GAME NOT FOUND";
            }
        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('game-title').innerText = "ERROR LOADING DATA";
        }
    }

    loadGameDetails();
</script>
</body>
</html>
